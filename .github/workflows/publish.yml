name: Publish

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # OIDC: required for npm trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22   # >= 22.14 required for trusted publishing
          registry-url: https://registry.npmjs.org
          cache: npm
      # Trusted publishing (OIDC) needs npm >= 11.5.1; Node 22 ships an older npm.
      - run: npm install -g npm@latest
      - run: npm ci
      # prepublishOnly runs build + test automatically before publishing.
      # No NPM_TOKEN: auth happens via OIDC against the configured Trusted Publisher.
      - run: npm publish --provenance --access public
